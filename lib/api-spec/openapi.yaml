openapi: 3.1.0
info:
  title: Api
  version: 0.1.0
  description: Travel Chatbot API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: pdf
    description: Chat and status operations
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"
  /pdf/chat:
    post:
      operationId: chatWithPdf
      tags: [pdf]
      summary: Ask a question (uses pre-loaded travel PDF + web search)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ChatRequest"
      responses:
        "200":
          description: Answer generated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ChatResponse"
        "400":
          description: Bad request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /pdf/status:
    get:
      operationId: getPdfStatus
      tags: [pdf]
      summary: Get travel PDF load status
      responses:
        "200":
          description: Status
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PdfStatus"
components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status
    ChatRequest:
      type: object
      properties:
        question:
          type: string
        history:
          type: array
          items:
            $ref: "#/components/schemas/ChatMessage"
      required:
        - question
    ChatMessage:
      type: object
      properties:
        role:
          type: string
          enum: [user, assistant]
        content:
          type: string
      required:
        - role
        - content
    ChatResponse:
      type: object
      properties:
        answer:
          type: string
        sources:
          type: array
          items:
            type: string
        webResults:
          type: array
          items:
            $ref: "#/components/schemas/WebResult"
      required:
        - answer
        - sources
    WebResult:
      type: object
      properties:
        title:
          type: string
        url:
          type: string
        content:
          type: string
      required:
        - title
        - url
        - content
    PdfStatus:
      type: object
      properties:
        indexed:
          type: boolean
        filename:
          type: string
        chunkCount:
          type: integer
      required:
        - indexed
    ErrorResponse:
      type: object
      properties:
        error:
          type: string
      required:
        - error
